<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="#0f172a"/>
  <!-- Phone outline -->
  <rect x="10" y="5" width="12" height="20" rx="3" stroke="#38bdf8" stroke-width="1.5" fill="none"/>
  <!-- Screen area -->
  <rect x="12" y="9" width="8" height="11" rx="1.5" fill="#38bdf8" opacity="0.25"/>
  <!-- Home indicator -->
  <rect x="14" y="22" width="4" height="1.5" rx="0.75" fill="#38bdf8" opacity="0.7"/>
  <!-- Notch -->
  <rect x="13.5" y="6.5" width="5" height="1.5" rx="0.75" fill="#0f172a"/>
  <!-- Status dots on screen - simulate app content -->
  <circle cx="14" cy="12" r="1" fill="#38bdf8" opacity="0.8"/>
  <rect x="16" y="11.25" width="3.5" height="1.5" rx="0.75" fill="#38bdf8" opacity="0.5"/>
  <circle cx="14" cy="15" r="1" fill="#38bdf8" opacity="0.6"/>
  <rect x="16" y="14.25" width="2.5" height="1.5" rx="0.75" fill="#38bdf8" opacity="0.4"/>
</svg>
